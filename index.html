<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGG AI Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 700px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.bot .message-content a {
            color: #667eea;
            text-decoration: none;
        }

        .message.bot .message-content a:hover {
            text-decoration: underline;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f0f0f0;
            border-radius: 12px;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 14px;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .input-area button:active {
            transform: translateY(0);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            font-size: 13px;
        }

        .info-message {
            background: #e7f3ff;
            color: #0066cc;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #0066cc;
            font-size: 13px;
            text-align: center;
        }

        .scroll-hint {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 UGG AI Chatbot</h1>
            <p>Demo für n8n Integration</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="info-message">
                👋 Willkommen! Stelle eine Frage zum Projekt.
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Deine Frage hier..."
                onkeypress="handleKeyPress(event)"
            >
            <button id="sendBtn" onclick="sendMessage()">Senden</button>
        </div>
    </div>

    <script>
        // WEBHOOK URL MIT CORS-PROXY
        const WEBHOOK_URL = "https://pmp74.app.n8n.cloud/webhook/demo-chat";
        
        // Session-ID für Tracking/Debugging
        const SESSION_ID = 'user-' + Math.random().toString(36).substring(2, 9);

        const chatMessages = document.getElementById("chatMessages");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        
        // Debug-Hilfsfunktion
        function logDebug(message) {
            console.log(`[${new Date().toLocaleTimeString()}] [${SESSION_ID}] ${message}`);
        }

        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${isUser ? "user" : "bot"}`;

            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";
            contentDiv.textContent = text;

            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const messageDiv = document.createElement("div");
            messageDiv.className = "message bot";
            messageDiv.id = "typingIndicator";

            const typingDiv = document.createElement("div");
            typingDiv.className = "typing";
            typingDiv.innerHTML = "<span></span><span></span><span></span>";

            messageDiv.appendChild(typingDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTyping() {
            const typingIndicator = document.getElementById("typingIndicator");
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function addError(text) {
            const messageDiv = document.createElement("div");
            messageDiv.className = "message bot";

            const contentDiv = document.createElement("div");
            contentDiv.className = "error-message";
            contentDiv.innerHTML = `⚠️ <strong>Fehler:</strong> ${text}`;

            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message) return;

            logDebug(`Nachricht gesendet: "${message}"`);

            // User-Nachricht anzeigen
            addMessage(message, true);
            messageInput.value = "";
            sendBtn.disabled = true;
            messageInput.disabled = true;

            // Typing-Indicator
            showTyping();

            try {
                logDebug(`POST zu ${WEBHOOK_URL}`);
                
                const response = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        message: message,
                        sessionId: SESSION_ID
                    })
                });

                removeTyping();

                logDebug(`Response Status: ${response.status}`);

                if (!response.ok) {
                    let errorMsg = `HTTP ${response.status}`;
                    try {
                        const errorData = await response.json();
                        errorMsg = errorData.message || errorMsg;
                        logDebug(`Webhook Error: ${JSON.stringify(errorData)}`);
                    } catch (e) {
                        logDebug(`Konnte Error-Response nicht parsen`);
                    }
                    addError(errorMsg);
                    return;
                }

                const data = await response.json();
                logDebug(`Antwort erhalten: ${typeof data}`);

                // Antwort anzeigen
                if (data.reply) {
                    addMessage(data.reply, false);
                    logDebug(`Reply angezeigt`);
                } else if (data.message) {
                    addMessage(data.message, false);
                    logDebug(`Message angezeigt`);
                } else {
                    addMessage("Keine Antwort vom Server", false);
                    logDebug(`Keine Antwort im Response`);
                }

                // Quellen anzeigen (falls vorhanden)
                if (data.sources && data.sources.length > 0) {
                    const sourcesText = data.sources.join(", ");
                    addMessage(`📚 Quellen: ${sourcesText}`, false);
                    logDebug(`${data.sources.length} Quellen angezeigt`);
                }

            } catch (error) {
                removeTyping();
                logDebug(`Fehler beim Senden: ${error.message}`);
                console.error("Fehler beim Senden:", error);
                
                let errorMsg = error.message;
                
                // Spezifische CORS-Fehler-Nachricht
                if (error.message.includes("Failed to fetch")) {
                    errorMsg = "CORS-Fehler oder n8n Webhook nicht erreichbar. Bitte überprüfe:<br>1. Ist die Webhook-URL korrekt?<br>2. Ist der n8n Workflow aktiv?<br>3. Hat der Webhook 'Listen for test event' aktiviert?";
                }
                
                addError(errorMsg);
            } finally {
                sendBtn.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Focus on input on load
        messageInput.focus();

        // Willkommens-Nachricht
        setTimeout(() => {
            addMessage("Wie kann ich dir heute helfen?", false);
        }, 500);
    </script>
</body>
</html>
