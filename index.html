<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Diktat-Champions!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        :root {
            --gold:#feca57; --green:#1dd1a1; --red:#ff6b6b;
            --purple:#667eea; --bg:#0d0d1a; --card:rgba(255,255,255,0.06);
            --border:rgba(255,255,255,0.12);
        }

        body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;color:white;overflow-x:hidden;}

        /* ── Stars ── */
        #stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
        .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite;opacity:0;}
        @keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5);}50%{opacity:var(--op);transform:scale(1);}}

        /* ── Screens ── */
        .screen{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:24px 16px 60px;}
        .screen.hidden{display:none;}

        /* ── Title ── */
        .game-title{
            font-family:'Fredoka One',cursive;text-align:center;font-size:2.4em;margin-bottom:4px;
            background:linear-gradient(90deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3,#ff6b6b);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            background-size:300% auto;animation:rainbow 4s linear infinite;
        }
        @keyframes rainbow{0%{background-position:0%}100%{background-position:300%}}
        .game-subtitle{text-align:center;font-size:0.8em;color:rgba(255,255,255,0.35);margin-bottom:24px;letter-spacing:2px;text-transform:uppercase;}

        /* ── Setup Sections ── */
        .setup-section{
            background:var(--card);border:2px solid var(--border);border-radius:22px;
            padding:22px 24px;margin-bottom:20px;backdrop-filter:blur(6px);
        }
        .setup-section h2{
            font-family:'Fredoka One',cursive;font-size:1.3em;margin-bottom:16px;
            display:flex;align-items:center;gap:10px;color:var(--gold);
        }

        /* Players setup */
        .player-input-row{
            display:flex;align-items:center;gap:10px;margin-bottom:10px;
        }
        .player-emoji{font-size:1.6em;flex-shrink:0;}
        .player-input-row input{
            flex:1;background:rgba(255,255,255,0.08);border:2px solid var(--border);
            border-radius:12px;padding:10px 14px;color:white;font-family:'Nunito',sans-serif;
            font-size:1em;font-weight:700;outline:none;transition:border-color 0.2s;
        }
        .player-input-row input:focus{border-color:var(--gold);}
        .player-input-row input::placeholder{color:rgba(255,255,255,0.3);}

        .btn-remove-player{
            background:rgba(255,107,107,0.15);border:2px solid rgba(255,107,107,0.35);
            border-radius:10px;padding:8px 12px;color:var(--red);cursor:pointer;
            font-size:1.1em;transition:all 0.2s;flex-shrink:0;
        }
        .btn-remove-player:hover{background:rgba(255,107,107,0.3);border-color:var(--red);}

        .btn-add-player{
            background:rgba(29,209,161,0.12);border:2px dashed rgba(29,209,161,0.4);
            border-radius:12px;padding:10px 18px;color:var(--green);
            font-family:'Nunito',sans-serif;font-size:0.95em;font-weight:800;
            cursor:pointer;transition:all 0.2s;width:100%;margin-top:4px;
        }
        .btn-add-player:hover{background:rgba(29,209,161,0.22);border-color:var(--green);}
        .btn-add-player:disabled{opacity:0.35;cursor:default;}

        /* Word list setup */
        .word-add-row{display:flex;gap:10px;margin-bottom:16px;}
        .word-add-row input{
            flex:1;background:rgba(255,255,255,0.08);border:2px solid var(--border);
            border-radius:12px;padding:10px 14px;color:white;font-family:'Nunito',sans-serif;
            font-size:1em;font-weight:700;outline:none;transition:border-color 0.2s;
        }
        .word-add-row input:focus{border-color:var(--gold);}
        .word-add-row input::placeholder{color:rgba(255,255,255,0.3);}

        .btn-add-word{
            background:linear-gradient(135deg,var(--gold),#ff9f43);
            border:none;border-radius:12px;padding:10px 20px;
            color:#1a1a1a;font-family:'Fredoka One',cursive;font-size:1em;
            cursor:pointer;transition:all 0.2s;white-space:nowrap;
            box-shadow:0 3px 14px rgba(254,202,87,0.35);
        }
        .btn-add-word:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(254,202,87,0.5);}

        .word-list-container{
            max-height:260px;overflow-y:auto;
            scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.2) transparent;
        }
        .word-list-container::-webkit-scrollbar{width:5px;}
        .word-list-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:3px;}

        .word-chip{
            display:flex;align-items:center;justify-content:space-between;
            background:rgba(102,126,234,0.15);border:1px solid rgba(102,126,234,0.3);
            border-radius:10px;padding:8px 14px;margin-bottom:7px;
            animation:chipIn 0.25s ease-out;
        }
        @keyframes chipIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
        .word-chip-text{font-weight:800;font-size:0.95em;color:#a29bfe;}
        .btn-delete-word{
            background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.3);
            border-radius:7px;padding:3px 8px;color:var(--red);cursor:pointer;
            font-size:0.85em;transition:all 0.2s;flex-shrink:0;
        }
        .btn-delete-word:hover{background:rgba(255,107,107,0.3);border-color:var(--red);}

        .word-count{font-size:0.82em;color:rgba(255,255,255,0.4);margin-bottom:10px;}

        .empty-list-hint{
            text-align:center;padding:20px;color:rgba(255,255,255,0.25);
            font-size:0.9em;font-style:italic;
        }

        /* Start button */
        .btn-start{
            width:100%;padding:16px;
            background:linear-gradient(135deg,var(--purple),#764ba2);
            border:none;border-radius:18px;color:white;
            font-family:'Fredoka One',cursive;font-size:1.5em;
            cursor:pointer;transition:all 0.3s;
            box-shadow:0 6px 24px rgba(102,126,234,0.45);
        }
        .btn-start:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 10px 32px rgba(102,126,234,0.6);}
        .btn-start:disabled{opacity:0.35;cursor:default;transform:none;}

        /* ── GAME SCREEN ── */

        /* Progress */
        .progress-wrap{background:rgba(255,255,255,0.07);border-radius:10px;height:9px;margin-bottom:16px;overflow:hidden;border:1px solid var(--border);}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold),#48dbfb);border-radius:10px;transition:width 0.6s ease;box-shadow:0 0 10px rgba(254,202,87,0.5);}

        /* Mode indicator */
        .mode-indicator{
            text-align:center;margin-bottom:14px;
            font-family:'Fredoka One',cursive;font-size:0.95em;
            color:rgba(255,255,255,0.45);letter-spacing:1px;
        }
        .mode-badge{
            display:inline-block;padding:4px 14px;border-radius:20px;font-size:0.9em;
        }
        .mode-badge.choice{background:rgba(102,126,234,0.2);color:#a29bfe;border:1px solid rgba(102,126,234,0.4);}
        .mode-badge.yesno{background:rgba(254,202,87,0.15);color:var(--gold);border:1px solid rgba(254,202,87,0.4);}

        /* Player cards */
        .players-area{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
        .player-card{
            flex:1;min-width:0;
            background:rgba(255,255,255,0.05);border:2px solid var(--border);
            border-radius:18px;padding:12px 10px;text-align:center;
            transition:all 0.35s;backdrop-filter:blur(6px);
        }
        .player-card.active{
            border-color:var(--gold);background:rgba(254,202,87,0.12);
            box-shadow:0 0 22px rgba(254,202,87,0.35),inset 0 0 16px rgba(254,202,87,0.06);
            transform:scale(1.04);
        }
        .player-card.eliminated{border-color:var(--red);background:rgba(255,107,107,0.07);opacity:0.5;}

        .pc-emoji{font-size:1.4em;margin-bottom:2px;}
        .pc-name{font-family:'Fredoka One',cursive;font-size:1em;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .pc-smiley{font-size:2.2em;display:block;transition:all 0.4s;line-height:1;}
        .pc-smiley.shake{animation:smileyShake 0.55s ease-in-out;}
        @keyframes smileyShake{
            0%,100%{transform:translateX(0) rotate(0);}
            15%{transform:translateX(-9px) rotate(-14deg);}
            35%{transform:translateX(9px) rotate(11deg);}
            55%{transform:translateX(-6px) rotate(-7deg);}
            75%{transform:translateX(6px) rotate(5deg);}
        }
        .pc-errors{font-size:0.7em;color:rgba(255,255,255,0.45);margin-top:3px;}
        .pc-lives{font-size:0.6em;margin-top:3px;letter-spacing:1px;}

        /* Turn indicator */
        .turn-indicator{
            text-align:center;margin-bottom:14px;
            font-family:'Fredoka One',cursive;font-size:1.2em;color:var(--gold);
            animation:pulseTurn 1.5s ease-in-out infinite;
        }
        @keyframes pulseTurn{0%,100%{text-shadow:0 0 8px rgba(254,202,87,0.3);}50%{text-shadow:0 0 20px rgba(254,202,87,0.8);}}

        /* Moderator */
        .moderator-area{display:flex;gap:12px;align-items:center;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:18px;padding:12px 16px;margin-bottom:14px;min-height:68px;}
        .mod-icon{font-size:2.2em;flex-shrink:0;animation:modBob 2.5s ease-in-out infinite;}
        @keyframes modBob{0%,100%{transform:translateY(0) rotate(0);}33%{transform:translateY(-5px) rotate(-5deg);}66%{transform:translateY(-2px) rotate(4deg);}}
        .mod-text{font-size:0.93em;font-weight:700;line-height:1.45;flex:1;color:rgba(255,255,255,0.9);}
        .mod-text.correct-msg{color:var(--green);}
        .mod-text.wrong-msg{color:var(--red);}

        /* Question card */
        .question-card{background:var(--card);border:2px solid var(--border);border-radius:22px;padding:20px 24px;margin-bottom:14px;backdrop-filter:blur(4px);}
        .q-meta{font-size:0.78em;color:rgba(255,255,255,0.35);margin-bottom:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        .q-tag{background:rgba(102,126,234,0.2);border:1px solid rgba(102,126,234,0.35);padding:2px 10px;border-radius:20px;font-size:0.85em;color:#a29bfe;}
        .question-text{font-size:1.18em;line-height:2;font-weight:700;}

        .blank-slot{display:inline-block;background:rgba(254,202,87,0.1);border:2px dashed rgba(254,202,87,0.55);border-radius:10px;padding:2px 14px;margin:0 4px;color:rgba(254,202,87,0.7);font-style:italic;min-width:70px;text-align:center;transition:all 0.3s;}
        .blank-slot.filled-ok{background:rgba(29,209,161,0.2);border-color:var(--green);border-style:solid;color:var(--green);font-style:normal;animation:fillPop 0.35s ease-out;}
        .blank-slot.filled-fail{background:rgba(255,107,107,0.2);border-color:var(--red);border-style:solid;color:var(--red);font-style:normal;}
        @keyframes fillPop{0%{transform:scale(0.8);}55%{transform:scale(1.12);}100%{transform:scale(1);}}

        /* Shown word (yes/no mode) */
        .shown-word{
            display:inline-block;background:rgba(254,202,87,0.15);
            border:2px solid var(--gold);border-radius:12px;
            padding:3px 14px;margin:0 4px;color:var(--gold);
            font-size:1.1em;font-weight:900;
            animation:wordGlow 2s ease-in-out infinite;cursor:default;
        }
        @keyframes wordGlow{0%,100%{box-shadow:0 0 6px rgba(254,202,87,0.3);}50%{box-shadow:0 0 18px rgba(254,202,87,0.7);}}
        .shown-word.reveal-ok{background:rgba(29,209,161,0.2);border-color:var(--green);color:var(--green);animation:none;}
        .shown-word.reveal-fail{background:rgba(255,107,107,0.2);border-color:var(--red);color:var(--red);text-decoration:line-through;animation:none;}

        .correct-reveal{display:none;margin-top:10px;font-size:0.95em;color:var(--green);font-weight:800;}
        .correct-reveal .cw{background:rgba(29,209,161,0.18);border:2px solid var(--green);border-radius:8px;padding:1px 12px;margin-left:6px;font-size:1.05em;}

        /* Choice buttons */
        .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
        .opt-btn{
            background:rgba(255,255,255,0.07);border:2px solid var(--border);
            border-radius:14px;padding:14px 14px;color:white;
            font-family:'Nunito',sans-serif;font-size:1.05em;font-weight:800;
            cursor:pointer;transition:all 0.2s;text-align:center;line-height:1.3;word-break:break-word;
        }
        .opt-btn:hover:not(:disabled){background:rgba(254,202,87,0.15);border-color:var(--gold);transform:translateY(-3px);box-shadow:0 6px 16px rgba(254,202,87,0.25);}
        .opt-btn:disabled{cursor:default;}
        .opt-btn.is-correct{background:rgba(29,209,161,0.3);border-color:var(--green);color:var(--green);animation:correctPulse 0.45s ease-out;}
        .opt-btn.is-wrong{background:rgba(255,107,107,0.3);border-color:var(--red);color:var(--red);animation:wrongWiggle 0.45s ease-out;}
        .opt-btn.is-reveal{background:rgba(29,209,161,0.15);border-color:rgba(29,209,161,0.45);color:var(--green);}
        @keyframes correctPulse{0%{transform:scale(1);}45%{transform:scale(1.08);box-shadow:0 0 30px var(--green);}100%{transform:scale(1);}}
        @keyframes wrongWiggle{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}

        /* Yes/No buttons */
        .judge-area{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
        .judge-btn{
            padding:18px 14px;border:3px solid transparent;border-radius:16px;
            color:white;font-family:'Nunito',sans-serif;font-size:1.1em;font-weight:900;
            cursor:pointer;transition:all 0.22s;text-align:center;
        }
        .judge-btn.yes-btn{background:rgba(29,209,161,0.12);border-color:rgba(29,209,161,0.45);}
        .judge-btn.yes-btn:hover:not(:disabled){background:rgba(29,209,161,0.28);border-color:var(--green);transform:translateY(-4px);box-shadow:0 8px 22px rgba(29,209,161,0.38);}
        .judge-btn.no-btn{background:rgba(255,107,107,0.12);border-color:rgba(255,107,107,0.45);}
        .judge-btn.no-btn:hover:not(:disabled){background:rgba(255,107,107,0.28);border-color:var(--red);transform:translateY(-4px);box-shadow:0 8px 22px rgba(255,107,107,0.38);}
        .judge-btn.chosen-correct{background:rgba(29,209,161,0.38);border-color:var(--green);box-shadow:0 0 24px rgba(29,209,161,0.5);animation:correctPulse 0.45s ease-out;}
        .judge-btn.chosen-wrong{background:rgba(255,107,107,0.38);border-color:var(--red);animation:wrongWiggle 0.45s ease-out;}
        .judge-btn:disabled{cursor:default;opacity:0.65;}

        /* Next / Back buttons */
        .btn-next{
            width:100%;padding:13px;background:linear-gradient(135deg,var(--purple),#764ba2);
            border:none;border-radius:14px;color:white;font-family:'Fredoka One',cursive;
            font-size:1.2em;cursor:pointer;transition:all 0.3s;display:none;
            box-shadow:0 4px 16px rgba(102,126,234,0.4);margin-bottom:10px;
        }
        .btn-next:hover{transform:translateY(-3px);box-shadow:0 8px 26px rgba(102,126,234,0.55);}
        .btn-back-setup{
            width:100%;padding:10px;background:rgba(255,255,255,0.06);
            border:2px solid var(--border);border-radius:12px;color:rgba(255,255,255,0.5);
            font-family:'Nunito',sans-serif;font-size:0.9em;font-weight:700;
            cursor:pointer;transition:all 0.2s;
        }
        .btn-back-setup:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);}

        /* Flash */
        .flash-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:900;}
        .flash-msg{font-family:'Fredoka One',cursive;font-size:3.5em;padding:16px 40px;border-radius:26px;opacity:0;transform:scale(0.3);transition:all 0.22s cubic-bezier(.175,.885,.32,1.275);}
        .flash-msg.show{opacity:1;transform:scale(1);}
        .flash-msg.correct-flash{background:rgba(29,209,161,0.92);box-shadow:0 0 55px rgba(29,209,161,0.7);}
        .flash-msg.wrong-flash{background:rgba(255,107,107,0.92);box-shadow:0 0 55px rgba(255,107,107,0.7);}

        /* Confetti */
        #confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:800;}
        .conf-piece{position:absolute;font-size:1.5em;animation:confFall var(--dur) ease-in forwards;top:-60px;}
        @keyframes confFall{0%{transform:translateY(0) rotate(0);opacity:1;}80%{opacity:1;}100%{transform:translateY(105vh) rotate(720deg);opacity:0;}}

        /* Game over */
        .game-over{
            display:none;text-align:center;background:rgba(255,255,255,0.04);
            border:2px solid var(--border);border-radius:28px;padding:36px 24px;margin-top:10px;
        }
        .go-emoji{font-size:4.5em;display:block;margin-bottom:12px;animation:goSpin 1s cubic-bezier(.175,.885,.32,1.275);}
        @keyframes goSpin{0%{transform:scale(0) rotate(-180deg);}100%{transform:scale(1) rotate(0deg);}}
        .go-title{font-family:'Fredoka One',cursive;font-size:2.1em;margin-bottom:8px;}
        .go-text{font-size:1em;color:rgba(255,255,255,0.72);margin-bottom:18px;line-height:1.7;}
        .go-scores{display:flex;justify-content:center;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
        .go-score-item{background:rgba(255,255,255,0.07);border-radius:14px;padding:11px 18px;font-size:0.95em;font-weight:800;}
        .btn-restart{
            background:linear-gradient(135deg,var(--red),var(--gold));
            border:none;border-radius:18px;padding:12px 38px;color:white;
            font-family:'Fredoka One',cursive;font-size:1.4em;cursor:pointer;
            transition:all 0.3s;box-shadow:0 6px 22px rgba(255,107,107,0.4);margin-right:10px;
        }
        .btn-restart:hover{transform:scale(1.07) translateY(-3px);box-shadow:0 12px 30px rgba(255,107,107,0.55);}
        .btn-go-setup{
            background:rgba(255,255,255,0.08);border:2px solid var(--border);
            border-radius:18px;padding:12px 28px;color:rgba(255,255,255,0.7);
            font-family:'Fredoka One',cursive;font-size:1.2em;cursor:pointer;transition:all 0.2s;
        }
        .btn-go-setup:hover{border-color:rgba(255,255,255,0.4);color:white;}

        @media(max-width:560px){
            .game-title{font-size:1.85em;}
            .question-text{font-size:1.02em;}
            .opt-btn{font-size:0.92em;padding:11px 9px;}
            .flash-msg{font-size:2.3em;padding:13px 26px;}
            .options-grid{grid-template-columns:1fr;}
            .judge-area{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>

<div id="stars"></div>
<div id="confetti"></div>
<div class="flash-overlay">
    <div class="flash-msg" id="flashMsg"></div>
</div>

<!-- ══════════════════ SETUP SCREEN ══════════════════ -->
<div class="screen" id="setupScreen">

    <h1 class="game-title">🎮 Diktat-Champions!</h1>
    <p class="game-subtitle">Gamemaster Setup</p>

    <!-- Players -->
    <div class="setup-section">
        <h2>👥 Spieler <span style="font-size:0.65em;color:rgba(255,255,255,0.4);font-family:'Nunito',sans-serif;font-weight:700">(1–4)</span></h2>
        <div id="playerInputs"></div>
        <button class="btn-add-player" id="btnAddPlayer" onclick="addPlayerInput()">
            ＋ Spieler hinzufügen
        </button>
    </div>

    <!-- Words -->
    <div class="setup-section">
        <h2>📝 Lernwörter</h2>
        <div class="word-add-row">
            <input type="text" id="wordInput" placeholder="Lernwort eingeben..." onkeydown="if(event.key==='Enter')addWord()">
            <button class="btn-add-word" onclick="addWord()">＋ Hinzufügen</button>
        </div>
        <div class="word-count" id="wordCount">0 Wörter</div>
        <div class="word-list-container" id="wordListContainer">
            <div class="empty-list-hint" id="emptyHint">Noch keine Wörter – einfach oben eintragen! ✏️</div>
        </div>
    </div>

    <button class="btn-start" id="btnStart" onclick="startGame()" disabled>
        🎮 Spiel starten!
    </button>
</div>

<!-- ══════════════════ GAME SCREEN ══════════════════ -->
<div class="screen hidden" id="gameScreen">

    <h1 class="game-title" style="font-size:1.9em;margin-bottom:2px;">🎮 Diktat-Champions!</h1>

    <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

    <div class="mode-indicator" id="modeIndicator"></div>

    <!-- Player cards -->
    <div class="players-area" id="playersArea"></div>

    <!-- Turn indicator -->

let G = {};   // filled by startGame()

// ══════════════════════════════════════════════════════════════════
//  UTILITY
// ══════════════════════════════════════════════════════════════════

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

// ══════════════════════════════════════════════════════════════════
//  DISTRACTOR GENERATOR
// ══════════════════════════════════════════════════════════════════

function generateDistractors(word, need = 3) {
    const seen = new Set([word]);
    const out  = [];

    function add(w) {
        if (w && !seen.has(w)) { seen.add(w); out.push(w); }
    }

    const parts = word.split(' ');

    // 1. Flip capitalisation of each part
    parts.forEach((p, i) => {
        const f = p[0] === p[0].toUpperCase()
            ? p[0].toLowerCase() + p.slice(1)
            : p[0].toUpperCase() + p.slice(1);
        const arr = [...parts]; arr[i] = f;
        add(arr.join(' '));
    });

    // 2. All parts fully lowercase
    const allLow = parts.map(p => p.toLowerCase()).join(' ');
    if (allLow !== word) add(allLow);

    // 3. All parts first-letter uppercase
    const allUp = parts.map(p => p[0].toUpperCase()+p.slice(1)).join(' ');
    if (allUp !== word) add(allUp);

    // Work on the main (last) part for spelling variants
    const pre  = parts.slice(0,-1).join(' ');
    const main = parts[parts.length-1];
    const pref = pre ? pre + ' ' : '';

    // 4. Double a consonant
    const cons = 'bdfgklmnprst';
    for (let i=1; i<main.length; i++) {
        const c = main[i].toLowerCase();
        if (cons.includes(c) && main[i-1]?.toLowerCase() !== c && main[i+1]?.toLowerCase() !== c) {
            add(pref + main.slice(0,i+1) + main[i] + main.slice(i+1)); break;
        }
    }

    // 5. Remove a doubled consonant
    for (let i=0; i<main.length-1; i++) {
        if (main[i].toLowerCase()===main[i+1].toLowerCase() && /[a-z]/i.test(main[i])) {
            add(pref + main.slice(0,i) + main.slice(i+1)); break;
        }
    }

    // 6. Umlaut swaps
    const umMap = [['ä','e'],['ü','u'],['ö','o'],['ä','ae'],['ü','ue'],['ö','oe']];
    for (const [f,t] of umMap) {
        if (out.length>=need) break;
        if (main.includes(f)) add(pref + main.replace(f, t));
    }

    // 7. ß ↔ ss
    if (main.includes('ß')) add(pref + main.replace('ß','ss'));
    else if (main.includes('ss')) add(pref + main.replace('ss','ß'));

    // 8. Remove middle letter
    if (main.length > 4) {
        const m = Math.floor(main.length/2);
        add(pref + main.slice(0,m) + main.slice(m+1));
    }

    // 9. Insert extra vowel
    for (let i=1; i<main.length; i++) {
        if ('aeiouäüö'.includes(main[i].toLowerCase())) {
            add(pref + main.slice(0,i) + main[i] + main.slice(i)); break;
        }
    }

    // 10. Swap ie ↔ ei
    if (main.includes('ie')) add(pref + main.replace('ie','ei'));
    else if (main.includes('ei')) add(pref + main.replace('ei','ie'));

    // Fallback padding
    let pad = 0;
    while (out.length < need) { add(pref + main + main[main.length-1]+(pad||'')); pad++; }

    // Shuffle and return exactly `need`
    return shuffle(out).slice(0, need);
}

// ══════════════════════════════════════════════════════════════════
//  SETUP SCREEN
// ══════════════════════════════════════════════════════════════════

function renderSetup() {
    renderPlayerInputs();
    renderWordList();
    updateStartBtn();
}

// ─── Players ──────────────────────────────────────────────────────

function renderPlayerInputs() {
    const c = document.getElementById('playerInputs');
    c.innerHTML = '';
    playerNames.forEach((name, i) => {
        const row = document.createElement('div');
        row.className = 'player-input-row';
        row.innerHTML = `
            <span class="player-emoji">${PLAYER_EMOJIS[i]}</span>
            <input type="text" value="${name}" placeholder="Spieler ${i+1}"
                   oninput="playerNames[${i}]=this.value;updateStartBtn()" maxlength="14">
            ${playerNames.length > 1
                ? `<button class="btn-remove-player" onclick="removePlayer(${i})" title="Entfernen">🗑</button>`
                : '<div style="width:36px"></div>'}
        `;
        c.appendChild(row);
    });
    document.getElementById('btnAddPlayer').disabled = playerNames.length >= 4;
}

function addPlayerInput() {
    if (playerNames.length >= 4) return;
    playerNames.push('Spieler '+(playerNames.length+1));
    renderPlayerInputs();
    updateStartBtn();
}

function removePlayer(i) {
    if (playerNames.length <= 1) return;
    playerNames.splice(i, 1);
    renderPlayerInputs();
    updateStartBtn();
}

// ─── Words ────────────────────────────────────────────────────────

function renderWordList() {
    const c     = document.getElementById('wordListContainer');
    const hint  = document.getElementById('emptyHint');
    const count = document.getElementById('wordCount');

    count.textContent = wordList.length + (wordList.length===1?' Wort':' Wörter');

    if (wordList.length === 0) {
        hint.style.display = 'block';
        // remove existing chips
        [...c.querySelectorAll('.word-chip')].forEach(e=>e.remove());
        return;
    }
    hint.style.display = 'none';

    // Rebuild chips
    [...c.querySelectorAll('.word-chip')].forEach(e=>e.remove());
    wordList.forEach((w, i) => {
        const chip = document.createElement('div');
        chip.className = 'word-chip';
        chip.id = 'chip-'+i;
        chip.innerHTML = `
            <span class="word-chip-text">${w}</span>
            <button class="btn-delete-word" onclick="deleteWord(${i})">🗑 löschen</button>
        `;
        c.appendChild(chip);
    });
}

function addWord() {
    const inp = document.getElementById('wordInput');
    const val = inp.value.trim();
    if (!val) return;
    wordList.push(val);
    inp.value = '';
    renderWordList();
    updateStartBtn();
    // Scroll to bottom
    const c = document.getElementById('wordListContainer');
    c.scrollTop = c.scrollHeight;
}

function deleteWord(i) {
    wordList.splice(i, 1);
    renderWordList();
    updateStartBtn();
}

function updateStartBtn() {
    const ok = playerNames.some(n=>n.trim()!=='') && wordList.length > 0;
    document.getElementById('btnStart').disabled = !ok;
}

// ══════════════════════════════════════════════════════════════════
//  GAME LOGIC
// ══════════════════════════════════════════════════════════════════

const WRONG_COMMENTS = [

// ── Build sentences ───────────────────────────────────────────────

const SENTENCE_TEMPLATES = [
    w=>`Das Spiel war so ___, dass alle vor Aufregung fast vom Stuhl fielen!`,
    w=>`Er versteckte seine Jause in ___, bis sie so stank, dass alle flohen.`,
    w=>`An allen ___ klebten geheime Kaugummis vom letzten Schuljahr.`,

    w=>`Er ist immer dann besonders ___, wenn er eigentlich still sein soll.`,
    w=>`Er ___ mit vollem Mund auf die Frage – was überhaupt nicht gut aussah.`,
    w=>`Er ___ rote Ohren, als er beim Schummeln erwischt wurde.`,
    w=>`Er hatte so viel ___, dass er sich versteckte – obwohl er der Größere war!`,
    w=>`Er ___ sich sehnlichst, dass der Unterricht endlich aufhört.`,
    w=>`Sein ___ roch nach alten Socken und kaltem Pizzakarton.`,
    w=>`Er musste ___ aufräumen, weil der andere angeblich Bauchschmerzen hatte.`,
    w=>`Beide ___ sich an und wussten: Das wird heute noch sehr schlimm.`,

    w=>`Er ___ plötzlich mitten im Raum und hatte mysteriöserweise Ketchup im Gesicht.`,

function buildSentence(word) {
    // Try to find a template that uses the word naturally
    // Otherwise pick a random one
    const tpl = SENTENCE_TEMPLATES[Math.floor(Math.random() * SENTENCE_TEMPLATES.length)];
    return tpl(word);
}

// ── Stars ─────────────────────────────────────────────────────────

function buildStars(){
    const c=document.getElementById('stars');
    for(let i=0;i<80;i++){
        const s=document.createElement('div');s.className='star';
        const sz=Math.random()*2.5+0.5;
        s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(2+Math.random()*4).toFixed(1)}s;--op:${(0.3+Math.random()*0.7).toFixed(2)};animation-delay:${(Math.random()*4).toFixed(1)}s`;
        c.appendChild(s);
    }
}

// ── Confetti ──────────────────────────────────────────────────────

function spawnConfetti(){
    const chars=['⭐','🌟','✨','🎉','🎊','💫','🍀','🏆','🌈'];
    const c=document.getElementById('confetti');
    for(let i=0;i<16;i++){
        setTimeout(()=>{
            const el=document.createElement('div');el.className='conf-piece';
            el.textContent=pick(chars);
            const dur=(1.3+Math.random()*1.2).toFixed(1);
            el.style.cssText=`left:${Math.random()*100}vw;--dur:${dur}s;animation-delay:${(i*0.06).toFixed(2)}s`;
            c.appendChild(el);setTimeout(()=>el.remove(),(parseFloat(dur)+0.5)*1000);
        },0);
    }
}

// ── Flash ─────────────────────────────────────────────────────────

function showFlash(text,type){
    const m=document.getElementById('flashMsg');
    m.textContent=text;m.className='flash-msg '+type+' show';
    setTimeout(()=>{m.className='flash-msg';},900);
}

// ── Lives bar ─────────────────────────────────────────────────────

function buildLivesBar(e){
    return SMILEYS.map((s,i)=>{
        if(i<e) return `<span style="opacity:0.18;text-decoration:line-through">${s}</span>`;
        if(i===e) return `<span style="font-size:1.2em">${s}</span>`;
        return `<span style="opacity:0.2">${s}</span>`;
    }).join('');
}

// ── Render player cards ───────────────────────────────────────────

function renderPlayerCards(){
    const area = document.getElementById('playersArea');
    area.innerHTML = '';
    G.players.forEach((p,i) => {
        const card = document.createElement('div');
        card.className = 'player-card' + (i===G.currentPlayerIdx?' active':'') + (p.eliminated?' eliminated':'');
        card.id = 'pc-'+i;
        card.innerHTML = `
            <div class="pc-emoji">${p.emoji}</div>
            <div class="pc-name">${p.name}</div>
            <span class="pc-smiley" id="smiley-${i}">${SMILEYS[p.errors]}</span>
            <div class="pc-errors" id="errors-${i}">${p.errors} Fehler</div>
            <div class="pc-lives" id="lives-${i}">${buildLivesBar(p.errors)}</div>
        `;
        area.appendChild(card);
    });
}

function updatePlayerCard(i){
    const p = G.players[i];
    document.getElementById('pc-'+i).className =
        'player-card' + (i===G.currentPlayerIdx?' active':'') + (p.eliminated?' eliminated':'');
    document.getElementById('smiley-'+i).textContent = SMILEYS[p.errors];
    document.getElementById('errors-'+i).textContent = p.errors+' Fehler';
    document.getElementById('lives-'+i).innerHTML = buildLivesBar(p.errors);
}

// ── Start game ────────────────────────────────────────────────────

function startGame(){
    const names = playerNames.map(n=>n.trim()).filter(n=>n!=='');
    if(names.length===0 || wordList.length===0) return;

    // Ensure enough questions
    const wordOrder = shuffle([...Array(wordList.length).keys()]);
    // Repeat list if needed (at least 10 questions)
    let questions = [...wordOrder];
    while(questions.length < 10) questions = [...questions, ...shuffle([...Array(wordList.length).keys()])];

    G = {
        players: names.map((name,i)=>({name, emoji:PLAYER_EMOJIS[i], errors:0, eliminated:false})),
        wordOrder: questions,
        qIdx: 0,
        currentPlayerIdx: 0,
        answered: false,
        shownWord: '', shownIsCorrect: false,
    };

    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    document.getElementById('gameOver').style.display='none';
    document.getElementById('questionCard').style.display='block';
    document.getElementById('optionsGrid').style.display='grid';
    document.getElementById('judgeArea').classList.add('hidden');
    document.getElementById('btnNext').style.display='none';

    renderPlayerCards();
    loadQuestion();
}

// ── Load question ─────────────────────────────────────────────────

function loadQuestion(){
    if(G.qIdx >= G.wordOrder.length){ finishGame(null); return; }

    G.answered = false;
    const word = wordList[G.wordOrder[G.qIdx]];
    const isChoiceMode = (G.qIdx % 2 === 0);    // alternate modes

    // Progress
    document.getElementById('progressFill').style.width =
        Math.min(100, (G.qIdx / Math.max(G.wordOrder.length,1)*100))+'%';

    // Mode badge
    const mi = document.getElementById('modeIndicator');
    if(isChoiceMode){
        mi.innerHTML = '<span class="mode-badge choice">✏️ Wähle das richtig geschriebene Wort</span>';
    } else {
        mi.innerHTML = '<span class="mode-badge yesno">🔍 Richtig oder falsch geschrieben?</span>';
    }

    // Q meta
    const p = G.players[G.currentPlayerIdx];
    document.getElementById('qNum').textContent = `Frage ${G.qIdx+1}`;
    document.getElementById('qPlayerTag').textContent = `${p.emoji} ${p.name} ist dran`;
    document.getElementById('turnIndicator').textContent = `▶ ${p.emoji} ${p.name} ist dran!`;

    // Build sentence
    const sentence = buildSentence(word);
    const parts = sentence.split('___');

    // Reset reveals
    document.getElementById('correctReveal').style.display='none';
    document.getElementById('correctReveal').innerHTML='';

    if(isChoiceMode){
        // 4-choice mode
        document.getElementById('questionText').innerHTML =
            parts[0]+'<span class="blank-slot" id="blankSlot">_ _ _</span>'+(parts[1]||'');

        const distractors = generateDistractors(word, 3);
        const options = shuffle([word, ...distractors]);

        const grid = document.getElementById('optionsGrid');
        grid.innerHTML='';
        options.forEach(opt=>{
            const btn=document.createElement('button');
            btn.className='opt-btn'; btn.textContent=opt;
            btn.onclick=()=>handleChoice(opt, word, btn);
            grid.appendChild(btn);
        });

        document.getElementById('optionsGrid').style.display='grid';
        document.getElementById('judgeArea').classList.add('hidden');
    } else {
        // Yes/No mode
        if(Math.random()<0.5){
            G.shownWord=word; G.shownIsCorrect=true;
        } else {
            G.shownWord=generateDistractors(word,1)[0]; G.shownIsCorrect=false;
        }
        document.getElementById('questionText').innerHTML =
            parts[0]+`<span class="shown-word" id="shownWordSpan">${G.shownWord}</span>`+(parts[1]||'');

        document.getElementById('optionsGrid').style.display='none';
        document.getElementById('judgeArea').classList.remove('hidden');
        document.getElementById('btnYes').disabled=false;
        document.getElementById('btnNo').disabled=false;
        document.getElementById('btnYes').className='judge-btn yes-btn';
        document.getElementById('btnNo').className='judge-btn no-btn';
    }

    document.getElementById('btnNext').style.display='none';
    setMod(pick(MOD_INTROS)(p.name),'');
}

// ── Handle choice (4-option mode) ────────────────────────────────

function handleChoice(selected, correct, btn){
    if(G.answered) return;
    G.answered=true;
    document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);

    const blank=document.getElementById('blankSlot');
    const ok=selected===correct;

    if(ok){
        btn.classList.add('is-correct');
        blank.textContent=selected; blank.className='blank-slot filled-ok';
        setMod(pick(CORRECT_COMMENTS),'correct-msg');
        showFlash('✅ RICHTIG!','correct-flash');
        spawnConfetti();
    } else {
        btn.classList.add('is-wrong');
        blank.textContent=selected+' ✗'; blank.className='blank-slot filled-fail';
        document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent===correct)b.classList.add('is-reveal');});
        setMod(pick(WRONG_COMMENTS),'wrong-msg');
        showFlash('❌ FALSCH!','wrong-flash');
        if(applyError()) return;
    }
    document.getElementById('btnNext').style.display='block';
}

// ── Handle yes/no (judge mode) ────────────────────────────────────

function handleJudge(playerSaysCorrect){
    if(G.answered) return;
    G.answered=true;
    document.getElementById('btnYes').disabled=true;
    document.getElementById('btnNo').disabled=true;

    const word = wordList[G.wordOrder[G.qIdx]];
    const playerIsRight = (playerSaysCorrect === G.shownIsCorrect);
    const clickedBtn = playerSaysCorrect
        ? document.getElementById('btnYes')
        : document.getElementById('btnNo');

    const span = document.getElementById('shownWordSpan');

    if(playerIsRight){
        span.className = G.shownIsCorrect ? 'shown-word reveal-ok' : 'shown-word reveal-fail';
        clickedBtn.classList.add('chosen-correct');
        setMod(pick(CORRECT_COMMENTS),'correct-msg');
        showFlash('✅ RICHTIG!','correct-flash');
        spawnConfetti();
        if(!G.shownIsCorrect) showCorrectReveal(word);
    } else {
        span.className = G.shownIsCorrect ? 'shown-word reveal-ok' : 'shown-word reveal-fail';
        clickedBtn.classList.add('chosen-wrong');
        setMod(pick(WRONG_COMMENTS),'wrong-msg');
        showFlash('❌ FALSCH!','wrong-flash');
        showCorrectReveal(word);
        if(applyError()) return;
    }
    document.getElementById('btnNext').style.display='block';
}

function showCorrectReveal(word){
    const rev = document.getElementById('correctReveal');
    rev.innerHTML=`✏️ Richtig geschrieben:<span class="cw">${word}</span>`;
    rev.style.display='block';
}

// ── Apply error to current player ────────────────────────────────

function applyError(){
    const i = G.currentPlayerIdx;
    const p = G.players[i];
    p.errors++;

    const sEl = document.getElementById('smiley-'+i);
    sEl.textContent = SMILEYS[p.errors];
    sEl.classList.add('shake');
    setTimeout(()=>sEl.classList.remove('shake'),600);
    updatePlayerCard(i);

    if(p.errors >= MAX_ERRORS){
        p.eliminated = true;
        updatePlayerCard(i);
        const alive = G.players.filter(pl=>!pl.eliminated);
        if(alive.length <= 1){
            setTimeout(()=>finishGame(p.name), 1700);
            return true;
        }
    }
    return false;
}

// ── Next turn ─────────────────────────────────────────────────────

function nextTurn(){
    // Advance to next non-eliminated player
    let next = (G.currentPlayerIdx + 1) % G.players.length;
    let tries = 0;
    while(G.players[next].eliminated && tries < G.players.length){
        next = (next+1) % G.players.length; tries++;
    }
    G.currentPlayerIdx = next;
    G.qIdx++;
    renderPlayerCards();
    loadQuestion();
}

// ── Moderator ─────────────────────────────────────────────────────

function setMod(text,cls){
    const el=document.getElementById('modText');
    el.textContent=text; el.className='mod-text '+cls;
}

// ── Finish game ───────────────────────────────────────────────────

function finishGame(loserName){
    document.getElementById('questionCard').style.display='none';
    document.getElementById('optionsGrid').style.display='none';
    document.getElementById('judgeArea').classList.add('hidden');
    document.getElementById('btnNext').style.display='none';
    document.getElementById('turnIndicator').textContent='';
    document.getElementById('modeIndicator').innerHTML='';
    document.getElementById('gameOver').style.display='block';

    const scores = G.players.map(p=>
        `<div class="go-score-item">${p.emoji} ${p.name}: ${p.errors} Fehler ${SMILEYS[p.errors]}${p.eliminated?' 💀':''}</div>`
    ).join('');
    document.getElementById('goScores').innerHTML=scores;

    const alive = G.players.filter(p=>!p.eliminated);
    if(loserName && alive.length===1){
        const winner = alive[0];
        document.getElementById('goEmoji').textContent='💀';
        document.getElementById('goTitle').textContent=`${loserName} ist RAUS! 😭`;
        document.getElementById('goText').innerHTML=
            `${winner.emoji} <strong>${winner.name}</strong> ist der Diktat-Champion! 🏆<br>
            <span style="font-size:0.88em;opacity:0.7">${loserName}... ich sag nichts. Aber ich DENKE was! 😬</span>`;
        setMod(`GAME OVER für ${loserName}! Das war... nun ja. Und ${winner.name}: Nicht zu viel angeben – perfekt war das auch nicht! 😈`,'wrong-msg');
    } else {
        // All questions done
        const sorted = [...G.players].sort((a,b)=>a.errors-b.errors);
        const best = sorted[0];
        const tied = sorted.filter(p=>p.errors===best.errors).length > 1;
        document.getElementById('goEmoji').textContent = tied?'🤝':'🏆';
        document.getElementById('goTitle').textContent = tied?'Unentschieden!':best.name+' gewinnt!';
        document.getElementById('goText').innerHTML = tied
            ? `Alle gleich gut – äh, gleich. Ein echtes Unentschieden! 🤝`
            : `${best.emoji} <strong>${best.name}</strong> hatte die wenigsten Fehler!<br><span style="opacity:0.7;font-size:0.88em">Ob Können oder Glück – wir wissen es nicht! 🎲</span>`;
        setMod(`Alle Fragen durch! Das hätte ich nicht erwartet. Wirklich nicht! 😲`,'correct-msg');
        spawnConfetti();
    }
}

// ── Navigate ──────────────────────────────────────────────────────

function goToSetup(){
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('setupScreen').classList.remove('hidden');
    renderSetup();
}

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════

buildStars();
renderSetup();
</script>
