<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call-Kosten Kalkulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .slider-wrapper {
            flex: 1;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .input-display {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 8px 12px;
            min-width: 120px;
            text-align: right;
            font-weight: 600;
            color: #667eea;
        }

        .input-number {
            width: 120px;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
        }

        .routing-info {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
        }

        .routing-item {
            font-weight: 500;
        }

        .routing-label {
            font-size: 12px;
            color: #999;
            min-width: 30px;
        }

        .routing-label-left {
            text-align: left;
        }

        .routing-label-right {
            text-align: right;
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 30px 0;
        }

        .results {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 25px;
            color: white;
        }

        .result-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 13px;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 6px;
        }

        .result-item-label {
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .result-item-value {
            font-weight: 600;
            font-size: 15px;
        }

        .info-text {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.8;
            font-style: italic;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 Call-Kosten Kalkulator</h1>

        <div class="input-group">
            <label class="input-label">Calls pro Monat</label>
            <div class="input-wrapper">
                <div class="slider-wrapper">
                    <input type="range" id="callsSlider" min="0" max="200000" step="1000" value="10000">
                </div>
                <input type="number" id="callsInput" class="input-number" min="0" max="200000" value="10000">
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Durchschn. Gesprächsdauer (AHT)</label>
            <div class="input-wrapper">
                <div class="slider-wrapper">
                    <input type="range" id="ahtSlider" min="5" max="15" step="1" value="10">
                </div>
                <div class="input-display"><span id="ahtValue">10</span> min</div>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Routing: DE vs GR</label>
            <div class="input-wrapper">
                <div class="routing-label routing-label-left">DE</div>
                <div class="slider-wrapper">
                    <input type="range" id="routingSlider" min="0" max="100" step="1" value="10">
                </div>
                <div class="routing-label routing-label-right">GR</div>
            </div>
            <div class="routing-info">
                <div class="routing-item">🇩🇪 DE: <span id="dePercent">10</span>%</div>
                <div class="routing-item">🇬🇷 GR: <span id="grPercent">90</span>%</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="results">
            <div class="result-title">Monatliche Gesamtkosten</div>
            <div class="result-value" id="totalCost">0,00 €</div>

            <div class="result-grid">
                <div class="result-item">
                    <div class="result-item-label">🇩🇪 DE Calls</div>
                    <div class="result-item-value" id="callsDE">0</div>
                </div>
                <div class="result-item">
                    <div class="result-item-label">🇬🇷 GR Calls</div>
                    <div class="result-item-value" id="callsGR">0</div>
                </div>
                <div class="result-item">
                    <div class="result-item-label">🇩🇪 DE Minuten</div>
                    <div class="result-item-value" id="minutesDE">0</div>
                </div>
                <div class="result-item">
                    <div class="result-item-label">🇬🇷 GR Minuten</div>
                    <div class="result-item-value" id="minutesGR">0</div>
                </div>
                <div class="result-item">
                    <div class="result-item-label">🇩🇪 DE Kosten</div>
                    <div class="result-item-value" id="costDE">0,00 €</div>
                </div>
                <div class="result-item">
                    <div class="result-item-label">🇬🇷 GR Kosten</div>
                    <div class="result-item-value" id="costGR">0,00 €</div>
                </div>
            </div>

            <div class="info-text">
                💡 Kostenbasis: Minutenpreis × Gesprächsminuten<br>
                DE: 0,85 €/min | GR: 0,58 €/min
            </div>
        </div>
    </div>

    <script>
        const COST_PER_MIN_DE = 0.85;
        const COST_PER_MIN_GR = 0.58;

        const callsSlider = document.getElementById('callsSlider');
        const callsInput = document.getElementById('callsInput');
        const ahtSlider = document.getElementById('ahtSlider');
        const ahtValue = document.getElementById('ahtValue');
        const routingSlider = document.getElementById('routingSlider');
        const dePercent = document.getElementById('dePercent');
        const grPercent = document.getElementById('grPercent');

        const totalCostEl = document.getElementById('totalCost');
        const callsDEEl = document.getElementById('callsDE');
        const callsGREl = document.getElementById('callsGR');
        const minutesDEEl = document.getElementById('minutesDE');
        const minutesGREl = document.getElementById('minutesGR');
        const costDEEl = document.getElementById('costDE');
        const costGREl = document.getElementById('costGR');

        function formatEUR(value) {
            return new Intl.NumberFormat('de-DE', {
                style: 'currency',
                currency: 'EUR',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }

        function formatInt(value) {
            return new Intl.NumberFormat('de-DE', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        }

        function recalcAndRender() {
            const callsTotal = parseInt(callsSlider.value);
            const ahtMin = parseInt(ahtSlider.value);
            const shareDE = parseInt(routingSlider.value);
            const shareGR = 100 - shareDE;

            const callsDEExact = callsTotal * (shareDE / 100);
            const callsDERounded = Math.round(callsDEExact);
            const callsGRRounded = callsTotal - callsDERounded;

            const minutesDE = callsDERounded * ahtMin;
            const minutesGR = callsGRRounded * ahtMin;

            const costDE = minutesDE * COST_PER_MIN_DE;
            const costGR = minutesGR * COST_PER_MIN_GR;
            const costTotal = costDE + costGR;

            callsInput.value = callsTotal;
            ahtValue.textContent = ahtMin;
            dePercent.textContent = shareDE;
            grPercent.textContent = shareGR;

            callsDEEl.textContent = formatInt(callsDERounded);
            callsGREl.textContent = formatInt(callsGRRounded);
            minutesDEEl.textContent = formatInt(minutesDE);
            minutesGREl.textContent = formatInt(minutesGR);
            costDEEl.textContent = formatEUR(costDE);
            costGREl.textContent = formatEUR(costGR);
            totalCostEl.textContent = formatEUR(costTotal);
        }

        callsSlider.addEventListener('input', recalcAndRender);
        callsInput.addEventListener('input', (e) => {
            let val = parseInt(e.target.value) || 0;
            val = Math.max(0, Math.min(200000, val));
            callsSlider.value = val;
            recalcAndRender();
        });

        ahtSlider.addEventListener('input', recalcAndRender);
        routingSlider.addEventListener('input', recalcAndRender);

        recalcAndRender();
    </script>
</body>
</html>
