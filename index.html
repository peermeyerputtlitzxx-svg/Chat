<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>UGG AI Voice Agent Chat</title>
  <style>
    #chat-container {
      max-width: 600px;
      margin: 50px auto;
      font-family: Arial, sans-serif;
    }
    #messages {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }
    .message {
      margin: 10px 0;
      padding: 8px;
      border-radius: 5px;
    }
    .user { background: #e3f2fd; text-align: right; }
    .bot { background: #f5f5f5; }
    #input-container {
      display: flex;
      gap: 10px;
    }
    #messageInput {
      flex: 1;
      padding: 10px;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      background: #1976d2;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background: #1565c0;
    }
    .debug {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 10px;
      margin-top: 10px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <h2>UGG AI Voice Agent MVP - Chat</h2>
    <div id="messages"></div>
    <div id="input-container">
      <input type="text" id="messageInput" placeholder="Stelle eine Frage zum UGG AI Projekt...">
      <button onclick="sendMessage()">Senden</button>
    </div>
    <div id="debug" class="debug" style="display: none;"></div>
  </div>

  <script>
    const sessionId = 'user-' + Math.random().toString(36).substr(2, 9);
    const WEBHOOK_URL = 'https://pmp74.app.n8n.cloud/webhook/chat';
    
    function logDebug(message) {
      console.log('[DEBUG]', message);
      const debugDiv = document.getElementById('debug');
      debugDiv.style.display = 'block';
      debugDiv.innerHTML += `<div>${new Date().toLocaleTimeString()} - ${message}</div>`;
      const children = debugDiv.children;
      while (children.length > 5) {
        children[0].remove();
      }
    }
    
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;
      
      addMessage(message, 'user');
      input.value = '';
      
      logDebug(`Sende Nachricht: "${message}"`);
      logDebug(`SessionID: ${sessionId}`);
      
      try {
        logDebug('Verbinde zu Webhook...');
        
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            message: message, 
            sessionId: sessionId 
          })
        });
        
        logDebug(`Response Status: ${response.status} ${response.statusText}`);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        logDebug(`Response Data: ${JSON.stringify(data)}`);
        
        if (data.reply) {
          addMessage(data.reply, 'bot');
          logDebug('Antwort angezeigt ✓');
        } else {
          addMessage('⚠️ Fehler: Keine Antwort vom Server (Leere Response)', 'bot');
          logDebug('FEHLER: Leere Response - data.reply ist undefined');
        }
      } catch (error) {
        logDebug(`❌ FEHLER: ${error.message}`);
        console.error('Vollständiger Fehler:', error);
        addMessage(`❌ Fehler: ${error.message}`, 'bot');
      }
    }
    
    function addMessage(text, type) {
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message ' + type;
      messageDiv.textContent = text;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    logDebug(`Chat geladen | SessionID: ${sessionId}`);
    logDebug(`Webhook URL: ${WEBHOOK_URL}`);
  </script>
</body>
</html>
