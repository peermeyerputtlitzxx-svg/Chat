<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>UGG AI Voice Agent Chat</title>
  <style>
    #chat-container {
      max-width: 600px;
      margin: 50px auto;
      font-family: Arial, sans-serif;
    }
    #messages {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }
    .message {
      margin: 10px 0;
      padding: 8px;
      border-radius: 5px;
    }
    .user { background: #e3f2fd; text-align: right; }
    .bot { background: #f5f5f5; }
    #input-container {
      display: flex;
      gap: 10px;
    }
    #messageInput {
      flex: 1;
      padding: 10px;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      background: #1976d2;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background: #1565c0;
    }
    .debug {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 10px;
      margin-top: 10px;
      border-radius: 4px;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <h2>UGG AI Voice Agent MVP - Chat</h2>
    <div id="messages"></div>
    <div id="input-container">
      <input type="text" id="messageInput" placeholder="Stelle eine Frage zum UGG AI Projekt...">
      <button onclick="sendMessage()">Senden</button>
    </div>
    <div id="debug" class="debug" style="display: none;"></div>
  </div>

  <script>
    const sessionId = 'user-' + Math.random().toString(36).substr(2, 9);
    const WEBHOOK_URL = 'https://pmp74.app.n8n.cloud/webhook/chat';
    
    function logDebug(message) {
      console.log('[DEBUG]', message);
      const debugDiv = document.getElementById('debug');
      debugDiv.style.display = 'block';
      const line = document.createElement('div');
      line.textContent = `${new Date().toLocaleTimeString()} - ${message}`;
      debugDiv.appendChild(line);
      debugDiv.scrollTop = debugDiv.scrollHeight;
    }
    
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;
      
      addMessage(message, 'user');
      input.value = '';
      
      logDebug(`📤 Sende: "${message}"`);
      logDebug(`SessionID: ${sessionId}`);
      
      try {
        logDebug('🔄 Verbinde zu Webhook...');
        
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            message: message, 
            sessionId: sessionId 
          })
        });
        
        logDebug(`📊 Status: ${response.status} ${response.statusText}`);
        
        const text = await response.text();
        logDebug(`📋 Raw Response: ${text.substring(0, 200)}...`);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${text}`);
        }
        
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error(`Keine gültige JSON Response: ${text}`);
        }
        
        logDebug(`✅ Parsed JSON: ${JSON.stringify(data)}`);
        
        // Prüfe verschiedene mögliche Antwort-Formate
        let reply = data.reply || data.output || data.message || data.text;
        
        if (reply) {
          addMessage(reply, 'bot');
          logDebug('💬 Antwort angezeigt ✓');
        } else {
          logDebug('⚠️ Keine Antwort gefunden! Data: ' + JSON.stringify(data));
          addMessage('❌ Server antwortet, aber Format stimmt nicht. Schau in Console (F12).', 'bot');
        }
        
      } catch (error) {
        logDebug(`❌ FEHLER: ${error.message}`);
        console.error('Vollständiger Fehler:', error);
        addMessage(`❌ ${error.message}`, 'bot');
      }
    }
    
    function addMessage(text, type) {
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message ' + type;
      messageDiv.textContent = text;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    logDebug(`✅ Chat geladen`);
    logDebug(`🔗 Webhook: ${WEBHOOK_URL}`);
  </script>
</body>
</html>
