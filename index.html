<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UGG AI Chat</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 12px; }
    #chat { display: flex; gap: 8px; }
    #messageInput { flex: 1; padding: 10px; }
    button { padding: 10px 14px; cursor: pointer; }
    #reply { margin-top: 16px; white-space: pre-wrap; border: 1px solid #ddd; padding: 12px; border-radius: 8px; min-height: 48px; }
    .hint { color: #666; font-size: 14px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>UGG AI Chat</h1>
  <div class="hint">Frage eingeben und senden. Antwort erscheint unten.</div>

  <div id="chat">
    <input type="text" id="messageInput" placeholder="Stelle eine Frage…" />
    <button id="sendBtn" type="button">Senden</button>
  </div>

  <div id="reply"></div>

  <script>
    // HIER deine n8n PRODUCTION Webhook URL rein
    const WEBHOOK_URL = "https://pmp74.app.n8n.cloud/webhook/ugg-ai-chat";

    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const replyBox = document.getElementById("reply");
      const message = (input.value || "").trim();
      if (!message) return;

      replyBox.textContent = "…";
      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            sessionId: "user-" + Date.now()
          })
        });

        const contentType = response.headers.get("content-type") || "";

        if (!response.ok) {
          const text = await response.text();
          replyBox.textContent = "HTTP " + response.status + ":\n" + text;
          return;
        }

        if (!contentType.includes("application/json")) {
          const text = await response.text();
          replyBox.textContent = "Unerwartete Antwort (kein JSON):\n" + text;
          return;
        }

        const data = await response.json();
        replyBox.textContent = data.reply ?? JSON.stringify(data, null, 2);
      } catch (err) {
        replyBox.textContent = "Fehler:\n" + err;
      }
    }

    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("messageInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
