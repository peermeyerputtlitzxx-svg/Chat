<!DOCTYPE html>
<html>
<head>
  <title>UGG AI Chat</title>
</head>
<body>
  <div id="chat">
    <input type="text" id="messageInput" placeholder="Stelle eine Frage...">
    <button onclick="sendMessage()">Senden</button>
    <div id="reply"></div>
  </div>

  <script>
    async function sendMessage() {
      const message = document.getElementById('messageInput').value;
      const response = await fetch('https://pmp74.app.n8n.cloud/webhook/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          message: message, 
          sessionId: 'user-' + Date.now() 
        })
      });
      const data = await response.json();
      document.getElementById('reply').innerText = data.reply;
    }
  </script>
</body>
