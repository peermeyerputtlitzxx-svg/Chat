<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>UGG AI Voice Agent Chat</title>
  <style>
    #chat-container {
      max-width: 600px;
      margin: 50px auto;
      font-family: Arial, sans-serif;
    }
    #messages {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }
    .message {
      margin: 10px 0;
      padding: 8px;
      border-radius: 5px;
    }
    .user { background: #e3f2fd; text-align: right; }
    .bot { background: #f5f5f5; }
    #input-container {
      display: flex;
      gap: 10px;
    }
    #messageInput {
      flex: 1;
      padding: 10px;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      background: #1976d2;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <h2>UGG AI Voice Agent MVP - Chat</h2>
    <div id="messages"></div>
    <div id="input-container">
      <input type="text" id="messageInput" placeholder="Stelle eine Frage zum UGG AI Projekt...">
      <button onclick="sendMessage()">Senden</button>
    </div>
  </div>

  <script>
    const sessionId = 'user-' + Math.random().toString(36).substr(2, 9);
    
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;
      
      // User-Nachricht anzeigen
      addMessage(message, 'user');
      input.value = '';
      
      try {
        const response = await fetch('https://pmp74.app.n8n.cloud/webhook/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            message: message, 
            sessionId: sessionId 
          })
        });
        
        const data = await response.json();
        addMessage(data.reply, 'bot');
      } catch (error) {
        addMessage('Fehler: Verbindung zum Chatbot fehlgeschlagen.', 'bot');
      }
    }
    
    function addMessage(text, type) {
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message ' + type;
      messageDiv.textContent = text;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    // Enter-Taste zum Senden
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
